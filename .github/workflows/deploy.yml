name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check API key secret
        run: |
          if [ -z "$KEY" ]; then
            echo "ERROR: VITE_OPENROUTER_API_KEY secret is EMPTY or NOT SET"
            exit 1
          else
            echo "OK: VITE_OPENROUTER_API_KEY is set (length: ${#KEY})"
          fi
        env:
          KEY: ${{ secrets.VITE_OPENROUTER_API_KEY }}

      - name: Build
        run: npm run build
        env:
          VITE_OPENROUTER_API_KEY: ${{ secrets.VITE_OPENROUTER_API_KEY }}
          VITE_BASE_PATH: /AI-Fitness-Planner/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
